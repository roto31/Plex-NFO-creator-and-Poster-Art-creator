name: Native macOS App Release

on:
  push:
    tags:
      - "native-v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Native macOS App
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364e1cea63 # v4.2.2
      - name: Build release binary
        run: swift build -c release
      - name: Package artifact
        run: |
          mkdir -p dist
          cp .build/release/PlexNFOCreator dist/
          cp VERSION dist/
          cp Resources/BundleDataManifest.json dist/
          tar -czf PlexNFOCreator-macos.tar.gz -C dist .
      - name: Upload release asset
        uses: softprops/action-gh-release@c062e08bd00278d7bbc5514cc03edd61901a2c47 # v2.0.8
        with:
          files: Native macOS App/PlexNFOCreator-macos.tar.gz
          generate_release_notes: true
