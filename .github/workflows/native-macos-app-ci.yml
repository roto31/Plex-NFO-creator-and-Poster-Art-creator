name: Native macOS App CI

on:
  push:
    paths:
      - "Native macOS App/**"
      - ".github/workflows/native-macos-app-ci.yml"
  pull_request:
    paths:
      - "Native macOS App/**"
      - ".github/workflows/native-macos-app-ci.yml"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Native macOS App
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364e1cea63 # v4.2.2
      - name: Read VERSION
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"
      - name: Swift build (debug)
        run: swift build
      - name: Swift test
        run: swift test
      - name: Swift build (release)
        run: swift build -c release
      - name: Export fixtures (syntax)
        working-directory: ${{ github.workspace }}
        run: python3 scripts/export_nfo_fixtures.py
