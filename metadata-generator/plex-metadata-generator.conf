{
  "comment": "Plex Metadata Generator Configuration",
  
  "library_root": "/mnt/media/TV",
  "cache_dir": "/var/cache/plex-metadata",
  
  "plex": {
    "url": "http://localhost:32400",
    "token": "YOUR_PLEX_TOKEN_HERE",
    "library_key": "1"
  },
  
  "tunarr": {
    "db_path": "/opt/tunarr/cache/tunarr.db"
  },
  
  "tvdb": {
    "api_key": "YOUR_TVDB_API_KEY_HERE",
    "enabled": true
  },
  
  "tmdb": {
    "api_key": "YOUR_TMDB_API_KEY_HERE",
    "enabled": true
  },
  
  "metadata_priority": [
    "tvdb",
    "tmdb",
    "tunarr"
  ],
  
  "logging": {
    "level": "INFO",
    "file": "/var/log/plex-metadata-generator.log",
    "max_size_mb": 100,
    "backup_count": 5
  },
  
  "scheduling": {
    "enabled": true,
    "daily_time": "02:00",
    "weekly_full_scan": true,
    "weekly_day": "Sunday"
  }
}
