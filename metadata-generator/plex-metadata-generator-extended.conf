{
  "comment": "Plex Metadata Generator - TV Shows + Movies + Music Configuration",

  "tv_library_root": "/mnt/media/TV",
  "movies_library_root": "/mnt/media/Movies",
  "music_library_root": "/mnt/media/Music",
  "cache_dir": "/var/cache/plex-metadata",

  "plex": {
    "url": "http://localhost:32400",
    "token": "YOUR_PLEX_TOKEN_HERE",
    "tv_library_key": "1",
    "movies_library_key": "2",
    "music_library_key": "3"
  },
  
  "tunarr": {
    "db_path": "/opt/tunarr/cache/tunarr.db"
  },
  
  "comment_tv": "TV Show metadata providers",
  "tvdb": {
    "api_key": "YOUR_TVDB_API_KEY_HERE",
    "enabled": true
  },
  
  "tmdb": {
    "api_key": "YOUR_TMDB_API_KEY_HERE",
    "enabled": true
  },

  "fanart_tv": {
    "api_key": "YOUR_FANART_TV_API_KEY_HERE"
  },

  "subtitles": {
    "enabled": false,
    "language": "auto",
    "sidecar": true,
    "embed_in_file": true,
    "opensubtitles": {
      "api_key": "YOUR_OPENSUBTITLES_API_KEY_HERE",
      "username": "YOUR_OPENSUBTITLES_USERNAME",
      "password": "YOUR_OPENSUBTITLES_PASSWORD"
    },
    "subdl": {
      "api_key": "YOUR_SUBDL_API_KEY_OR_LEAVE_EMPTY"
    }
  },

  "comment_music": "Music metadata providers — priority: local MB DB → Spotify → MusicBrainz REST API",

  "musicbrainz_db": {
    "comment": "Optional: local MusicBrainz PostgreSQL database for instant offline lookups.",
    "comment_setup": "PostgreSQL dump: https://data.metabrainz.org/pub/musicbrainz/data/fullexport/ | JSON dump: https://data.metabrainz.org/pub/musicbrainz/data/json-dumps",
    "host":     "localhost",
    "port":     5432,
    "dbname":   "musicbrainz",
    "user":     "musicbrainz",
    "password": "",
    "schema":   "musicbrainz",
    "skip":     true
  },

  "musicbrainz_json_dump_dir": "",
  "comment_json_dump": "Alternative to PostgreSQL: path to extracted JSON dump directory. Download: https://data.metabrainz.org/pub/musicbrainz/data/json-dumps",

  "musicbrainz_contact": "your_email@example.com",

  "comment_apple": "iTunes Search API is always active — no credentials needed.",
  "apple_musickit": {
    "comment": "Optional: Apple MusicKit API for richer metadata and higher-res artwork.",
    "comment_setup": "1. developer.apple.com → Certificates, Identifiers & Profiles → Keys",
    "comment_setup2": "2. Create a key with 'MusicKit' enabled → download the .p8 file",
    "comment_setup3": "3. Note the Key ID (10 chars) and your Team ID (top-right of portal)",
    "enabled": false,
    "team_id": "",
    "key_id": "",
    "private_key_path": "",
    "storefront": "us",
    "skip": false
  },

  "metadata_priority": {
    "tv": ["tvdb", "tmdb", "tunarr"],
    "movies": ["tmdb"],
    "music": ["apple_musickit", "itunes", "musicbrainz"]
  },
  
  "library_structure": {
    "tv": "Show Name/Season N/episode.mkv",
    "music": "Artist Name/Album Name/01 - Track Title.mp3"
  },
  
  "logging": {
    "level": "INFO",
    "file": "/var/log/plex-metadata-generator.log",
    "max_size_mb": 100,
    "backup_count": 5
  },
  
  "scheduling": {
    "enabled": true,
    "daily_time": "02:00",
    "process_tv_at": "02:00",
    "process_music_at": "04:00",
    "comment": "Can run TV and music at different times if desired"
  }
}
